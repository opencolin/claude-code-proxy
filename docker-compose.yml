services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OBSERVABILITY_DB_PATH: ${OBSERVABILITY_DB_PATH:-/app/data/observability.sqlite3}
    ports:
      - 8083:8083
    volumes:
      - ./data:/app/data
